<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <!--
    Play Store Feature Graphic — 1024×500
    "Sleep sounds, beautifully simple." + phone peek + "Free to start" + ★4.9
    Source: Wisp Marketing.dc.html brand kit
  -->
  <defs>
    <!-- Dark night bg: radial-gradient(80% 120% at 78% -10%, #2a2f5e 0%, #0c1226 50%, #0a0e1c 100%) -->
    <radialGradient id="featureBg" cx="78%" cy="-10%" r="110%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2a2f5e"/>
      <stop offset="50%"  stop-color="#0c1226"/>
      <stop offset="100%" stop-color="#0a0e1c"/>
    </radialGradient>
    <!-- Accent gradient for icon/CTA pill -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c8cf0"/>
      <stop offset="100%" stop-color="#b98cf0"/>
    </linearGradient>
    <!-- CTA pill gradient (135deg) -->
    <linearGradient id="ctaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c8cf0"/>
      <stop offset="100%" stop-color="#b98cf0"/>
    </linearGradient>
    <!-- Phone frame gradient -->
    <radialGradient id="phoneBg" cx="50%" cy="36%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#191e44"/>
      <stop offset="62%"  stop-color="#0a0e1c"/>
      <stop offset="100%" stop-color="#0a0e1c"/>
    </radialGradient>
    <!-- Progress ring gradient -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c8cf0"/>
      <stop offset="100%" stop-color="#b98cf0"/>
    </linearGradient>
    <!-- Shadow filter for phone -->
    <filter id="phoneShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="30" stdDeviation="35" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#featureBg)"/>

  <!-- Star dots (from brand kit positions, scaled to 1024×500) -->
  <circle cx="120"  cy="90"  r="2.5" fill="#7c8cf0" opacity="0.70"/>
  <circle cx="280"  cy="150" r="2.0" fill="#b98cf0" opacity="0.60"/>
  <circle cx="200"  cy="380" r="2.2" fill="#7c8cf0" opacity="0.50"/>
  <circle cx="60"   cy="260" r="1.8" fill="#9aa6f5" opacity="0.50"/>
  <circle cx="420"  cy="80"  r="2.0" fill="#b98cf0" opacity="0.45"/>
  <circle cx="340"  cy="430" r="1.6" fill="#7c8cf0" opacity="0.35"/>
  <circle cx="480"  cy="200" r="1.5" fill="#9aa6f5" opacity="0.30"/>

  <!-- ============ LEFT CONTENT ============ -->
  <!-- App icon badge -->
  <rect x="64" y="176" width="62" height="62" rx="18" ry="18" fill="url(#accentGrad)"/>
  <!-- Wisp mark in icon: scale 24→36px, centre at (95, 207) -->
  <!-- scale = 36/24 = 1.5; translate so centre aligns: 95-(24*1.5/2)=77, 207-(24*1.5/2)=189 -->
  <g transform="translate(77,189) scale(1.5)">
    <path d="M2 14c3.2 0 3.2-4.2 6.4-4.2s3.2 8.4 6.4 8.4 3.2-4.2 6.8-4.2"
          fill="none" stroke="#0c1226" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- "Wisp" wordmark -->
  <text x="142" y="218" font-family="'Sora', system-ui, sans-serif" font-size="38" font-weight="700"
        fill="#eef1ff" letter-spacing="-0.5">Wisp</text>

  <!-- Headline: "Sleep sounds," / "beautifully simple." -->
  <text x="64" y="286" font-family="'Sora', system-ui, sans-serif" font-size="46" font-weight="700"
        fill="#eef1ff" letter-spacing="-1">Sleep sounds,</text>
  <text x="64" y="340" font-family="'Sora', system-ui, sans-serif" font-size="46" font-weight="700"
        fill="#eef1ff" letter-spacing="-1">beautifully simple.</text>

  <!-- Subheadline -->
  <text x="64" y="376" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" font-weight="400"
        fill="#aeb6e0">Rain, ocean, fire and more — layer your perfect night</text>
  <text x="64" y="400" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" font-weight="400"
        fill="#aeb6e0">and drift off in seconds.</text>

  <!-- "Free to start" CTA pill -->
  <rect x="64" y="424" width="168" height="44" rx="22" ry="22" fill="url(#ctaGrad)"/>
  <!-- Play triangle -->
  <polygon points="91,446 83,438 83,454" fill="#0c1226"/>
  <text x="99" y="451" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="16" font-weight="700"
        fill="#0c1226">Free to start</text>

  <!-- Star rating -->
  <text x="252" y="449" font-family="system-ui, sans-serif" font-size="16" fill="#f0c87c" letter-spacing="2">★★★★★</text>
  <text x="344" y="449" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="600"
        fill="#dfe3f7">4.9</text>

  <!-- ============ PHONE MOCK (right side, peeking) ============ -->
  <!-- Phone body: 280×560 border-radius 40 at right:78 top:64 -->
  <!-- left = 1024 - 78 - 280 = 666 -->
  <g filter="url(#phoneShadow)">
    <rect x="666" y="20" width="280" height="560" rx="40" ry="40"
          fill="url(#phoneBg)" stroke="#1a1f3c" stroke-width="6"/>
  </g>

  <!-- Status area / "Now playing" label -->
  <text x="806" y="72" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="400"
        fill="#8d96bd" text-anchor="middle">Now playing</text>
  <text x="806" y="94" font-family="'Sora', system-ui, sans-serif" font-size="18" font-weight="600"
        fill="#eef1ff" text-anchor="middle">Rain on leaves</text>

  <!-- Circular progress ring: centre (806, 220), r=70 -->
  <!-- Track circle -->
  <circle cx="806" cy="230" r="70" fill="none" stroke="#1c2240" stroke-width="5"/>
  <!-- Progress arc: circumference = 2π×70 ≈ 439.8; dashoffset for ~65% = 439.8 * 0.35 ≈ 154 -->
  <circle cx="806" cy="230" r="70" fill="none" stroke="url(#ringGrad)" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="439.8" stroke-dashoffset="154"
          transform="rotate(-90 806 230)"/>

  <!-- Inner orb (pause icon + timer) -->
  <circle cx="806" cy="230" r="50" fill="url(#accentGrad)"/>
  <!-- Pause bars -->
  <rect x="796" y="220" width="7" height="20" rx="2" fill="#0c1226"/>
  <rect x="808" y="220" width="7" height="20" rx="2" fill="#0c1226"/>
  <!-- Timer text -->
  <text x="806" y="260" font-family="'Sora', system-ui, sans-serif" font-size="13" font-weight="700"
        fill="#0c1226" text-anchor="middle">30:00</text>

  <!-- Volume row inside phone -->
  <rect x="688" y="320" width="236" height="54" rx="16" ry="16" fill="#12172e" stroke="#ffffff" stroke-width="0" opacity="0.9"/>
  <rect x="688" y="320" width="236" height="54" rx="16" ry="16" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
  <text x="701" y="340" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="600"
        fill="#bcc6ff">Volume</text>
  <text x="910" y="340" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="400"
        fill="#8d96bd" text-anchor="end">70%</text>
  <!-- Slider track -->
  <rect x="701" y="350" width="210" height="5" rx="2.5" fill="#1c2240"/>
  <!-- Slider fill (70%) -->
  <rect x="701" y="350" width="147" height="5" rx="2.5" fill="url(#ringGrad)"/>

  <!-- Second row: Rain sound active -->
  <rect x="688" y="385" width="236" height="48" rx="15" ry="15"
        fill="#23284a" stroke="#7c8cf0" stroke-width="1" opacity="1"/>
  <!-- Rain icon tile -->
  <rect x="700" y="394" width="30" height="30" rx="9" fill="rgba(124,140,240,0.18)"/>
  <g transform="translate(706,400) scale(0.75)">
    <path d="M7 13.5a3.8 3.8 0 0 1 .5-7.5 4.8 4.8 0 0 1 9.2 1.3A3.4 3.4 0 0 1 16.7 14"
          fill="none" stroke="#bcc6ff" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M8.5 17l-1 2.2M12 17l-1 2.2M15.5 17l-1 2.2"
          fill="none" stroke="#bcc6ff" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <text x="740" y="406" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="14" font-weight="600"
        fill="#eef1ff">Rain</text>
  <text x="740" y="422" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="600"
        fill="#7c8cf0">On · 70%</text>
  <!-- Toggle on -->
  <rect x="895" y="400" width="40" height="24" rx="12" fill="#7c8cf0"/>
  <circle cx="923" cy="412" r="9" fill="#0c1226"/>
</svg>
