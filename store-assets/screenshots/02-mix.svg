<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 720" width="360" height="720">
  <!--
    Screenshot 02 — "Mix your perfect night"
    Source: Wisp Marketing.dc.html SS2 composition
    Rasterize at 1080×2160 (3×) for Play Console
  -->
  <defs>
    <!-- Night bg: linear-gradient(170deg,#1c2348,#0a0e1c 70%) -->
    <linearGradient id="ss2Bg" x1="0.15" y1="0" x2="0.85" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1c2348"/>
      <stop offset="70%"  stop-color="#0a0e1c"/>
      <stop offset="100%" stop-color="#0a0e1c"/>
    </linearGradient>
    <!-- Phone inner bg -->
    <radialGradient id="phoneBg2" cx="50%" cy="30%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#191e44"/>
      <stop offset="70%"  stop-color="#0a0e1c"/>
      <stop offset="100%" stop-color="#0a0e1c"/>
    </radialGradient>
    <!-- Orbit ring gradient -->
    <linearGradient id="orbitGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c8cf0"/>
      <stop offset="100%" stop-color="#b98cf0"/>
    </linearGradient>
    <!-- Orb fill gradient -->
    <linearGradient id="orbFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c8cf0"/>
      <stop offset="100%" stop-color="#b98cf0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="360" height="720" fill="url(#ss2Bg)"/>

  <!-- Star dots -->
  <circle cx="60"  cy="120" r="2.5" fill="#7c8cf0" opacity="0.60"/>
  <circle cx="300" cy="90"  r="2.0" fill="#b98cf0" opacity="0.50"/>
  <circle cx="320" cy="200" r="1.8" fill="#9aa6f5" opacity="0.50"/>
  <circle cx="40"  cy="300" r="1.5" fill="#7c8cf0" opacity="0.35"/>

  <!-- === CAPTION === -->
  <text x="180" y="92" font-family="'Sora', system-ui, sans-serif" font-size="30" font-weight="700"
        fill="#eef1ff" text-anchor="middle" letter-spacing="-0.6">Mix your</text>
  <text x="180" y="128" font-family="'Sora', system-ui, sans-serif" font-size="30" font-weight="700"
        fill="#eef1ff" text-anchor="middle" letter-spacing="-0.6">perfect night</text>
  <text x="180" y="156" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="14.5" font-weight="500"
        fill="#aeb6e0" text-anchor="middle">Layer sounds, set volumes, save it.</text>

  <!-- === PHONE MOCK === -->
  <rect x="46" y="250" width="268" height="510" rx="34" ry="34"
        fill="url(#phoneBg2)" stroke="#1a1f3c" stroke-width="6"/>
  <!-- Notch pill -->
  <rect x="141" y="256" width="78" height="6" rx="3" fill="#1a1f3c"/>

  <!-- "Now playing" -->
  <text x="180" y="296" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="400"
        fill="#8d96bd" text-anchor="middle">Now playing</text>
  <text x="180" y="314" font-family="'Sora', system-ui, sans-serif" font-size="15" font-weight="600"
        fill="#eef1ff" text-anchor="middle">Your mix</text>

  <!-- === ORBIT === -->
  <!-- Centre: (180, 440) -->
  <!-- Outer ring track -->
  <circle cx="180" cy="440" r="85" fill="none" stroke="#1c2240" stroke-width="5"/>
  <!-- Progress arc: circumference ≈ 534; dashoffset for ~67% = 534×0.33 ≈ 176 -->
  <circle cx="180" cy="440" r="85" fill="none" stroke="url(#orbitGrad)" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="534" stroke-dashoffset="176"
          transform="rotate(-90 180 440)"/>

  <!-- Central orb -->
  <circle cx="180" cy="440" r="58" fill="url(#orbFill)"/>
  <!-- Pause bars -->
  <rect x="170" y="428" width="8" height="24" rx="2" fill="#0c1226"/>
  <rect x="183" y="428" width="8" height="24" rx="2" fill="#0c1226"/>
  <!-- Timer -->
  <text x="180" y="468" font-family="'Sora', system-ui, sans-serif" font-size="12" font-weight="700"
        fill="#0c1226" text-anchor="middle">30:00</text>

  <!-- Orbiting sound nodes -->
  <!-- Top: Rain -->
  <circle cx="180" cy="350" r="28" fill="#1a2042" stroke="#7c8cf0" stroke-width="2"/>
  <g transform="translate(168,338) scale(0.9)">
    <path d="M7 13.5a3.8 3.8 0 0 1 .5-7.5 4.8 4.8 0 0 1 9.2 1.3A3.4 3.4 0 0 1 16.7 14"
          fill="none" stroke="#bcc6ff" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Right: Ocean -->
  <circle cx="270" cy="440" r="25" fill="#1a2042" stroke="rgba(124,140,240,0.5)" stroke-width="2"/>
  <g transform="translate(259,428) scale(0.85)">
    <path d="M2 8.5c2 0 2-1.6 4-1.6s2 1.6 4 1.6 2-1.6 4-1.6 2 1.6 4 1.6" fill="none" stroke="#bcc6ff" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M2 14c2 0 2-1.6 4-1.6s2 1.6 4 1.6 2-1.6 4-1.6 2 1.6 4 1.6" fill="none" stroke="#bcc6ff" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Left: Fire -->
  <circle cx="90" cy="440" r="25" fill="#1a2042" stroke="rgba(124,140,240,0.4)" stroke-width="2"/>
  <g transform="translate(80,428) scale(0.85)">
    <path d="M12 3c.6 2.6 3.6 3.7 3.6 7.6a3.6 3.6 0 1 1-7.2 0c0-2 1.4-3 2-4 .8 1 1.6 1.4 1.6 0z"
          fill="none" stroke="#bcc6ff" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Volume bar below orbit -->
  <rect x="62" y="540" width="240" height="46" rx="15" fill="#12172e" stroke="#ffffff" stroke-width="0.5" opacity="0.97"/>
  <rect x="62" y="540" width="240" height="46" rx="15" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
  <text x="75" y="558" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="600"
        fill="#bcc6ff">Rain</text>
  <text x="291" y="558" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="400"
        fill="#8d96bd" text-anchor="end">80%</text>
  <!-- Track -->
  <rect x="75" y="568" width="210" height="5" rx="2.5" fill="#1c2240"/>
  <!-- Fill 80% -->
  <rect x="75" y="568" width="168" height="5" rx="2.5" fill="url(#orbitGrad)"/>
</svg>
