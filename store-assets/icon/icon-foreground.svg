<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <!--
    Android Adaptive Icon — Foreground layer
    Canvas: 108×108 dp
    Safe keyline: 66% of 108 = 71.28 dp
    Safe zone is centred: offset = (108 - 71.28) / 2 = 18.36 dp each side
    Wisp mark must stay within ~18–90 dp on each axis.

    We render the wisp mark in a 52×52 area centred at (54,54):
    offset = 54 - 26 = 28 dp  → well within the 18 dp safe margin.
  -->
  <defs>
    <linearGradient id="wispGradFg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c8cf0"/>
      <stop offset="100%" stop-color="#b98cf0"/>
    </linearGradient>
  </defs>

  <!-- The foreground layer is transparent everywhere except the mark -->
  <!-- Wisp mark centred at (54,54), rendered in 52×52 box → scale = 52/24 ≈ 2.167 -->
  <!-- translate to (54 - 52/2, 54 - 52/2) = (28, 28) -->
  <g transform="translate(28,28) scale(2.167)">
    <path d="M2 14c3.2 0 3.2-4.2 6.4-4.2s3.2 8.4 6.4 8.4 3.2-4.2 6.8-4.2"
          fill="none" stroke="#0c1226" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Safe keyline guide (remove before production, left as comment reference) -->
  <!-- <rect x="18.36" y="18.36" width="71.28" height="71.28" fill="none" stroke="red" stroke-width="0.5" stroke-dasharray="2,2"/> -->
</svg>
